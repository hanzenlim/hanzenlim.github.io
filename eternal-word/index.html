<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eternal Word</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #08101e;
      --text: #f0e6d3;
      --gold: #b8975a;
      --gold-light: #d4af70;
      --muted: #4e4840;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient divine light from above */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 50vh;
      background: radial-gradient(ellipse at 50% -10%, rgba(180, 140, 55, 0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Stars */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--lo); }
      50%       { opacity: var(--hi); }
    }

    /* Layout */
    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .brand {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 4.5rem;
    }

    /* Verse card */
    .verse-card {
      position: relative;
    }

    /* Soft glow behind the verse */
    .verse-card::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 110%;
      height: 130%;
      background: radial-gradient(ellipse at center, rgba(184, 151, 90, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .quote-mark {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      line-height: 0.45;
      color: var(--gold);
      opacity: 0.3;
      margin-bottom: 2rem;
      user-select: none;
    }

    #verse-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.35rem, 2.8vw, 1.95rem);
      font-style: italic;
      font-weight: 300;
      line-height: 1.9;
      color: var(--text);
      min-height: 9rem;
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    #verse-text.fading {
      opacity: 0;
      transform: translateY(10px);
    }

    /* Ornamental divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      margin: 2.2rem 0;
    }

    .divider-line {
      width: 55px;
      height: 1px;
      background: var(--gold);
      opacity: 0.3;
    }

    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      opacity: 0.45;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    #verse-reference {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: var(--gold-light);
      transition: opacity 0.55s ease;
      min-height: 1.2em;
    }

    #verse-reference.fading {
      opacity: 0;
    }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 3.5rem;
      padding: 0.9rem 2.8rem;
      background: transparent;
      border: 1px solid rgba(184, 151, 90, 0.3);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.35s ease, color 0.35s ease;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(184, 151, 90, 0.07);
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.35s ease;
    }

    .btn:not(:disabled):hover {
      border-color: rgba(184, 151, 90, 0.6);
      color: var(--text);
    }

    .btn:not(:disabled):hover::before {
      transform: scaleX(1);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Footer */
    footer {
      margin-top: 5rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      #verse-text { font-size: 1.3rem; line-height: 1.8; }
      .quote-mark  { font-size: 6rem; }
    }
  </style>
</head>
<body>

  <div id="stars"></div>

  <div class="container">

    <p class="brand">Eternal Word</p>

    <div class="verse-card">
      <span class="quote-mark">&ldquo;</span>
      <p id="verse-text"></p>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
      </div>
      <p id="verse-reference"></p>
    </div>

    <button class="btn" id="btn">Receive a New Verse</button>

    <footer>King James Version &nbsp;&bull;&nbsp; wldeh/bible-api</footer>

  </div>

  <script>
    // Star field
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 1.5 + 0.4;
      s.style.cssText = [
        `width:${size}px`, `height:${size}px`,
        `top:${Math.random()*100}%`, `left:${Math.random()*100}%`,
        `--dur:${(3 + Math.random()*5).toFixed(1)}s`,
        `--delay:-${(Math.random()*6).toFixed(1)}s`,
        `--lo:${(0.05 + Math.random()*0.15).toFixed(2)}`,
        `--hi:${(0.35 + Math.random()*0.5).toFixed(2)}`,
      ].join(';');
      starsEl.appendChild(s);
    }

    const BASE = 'https://cdn.jsdelivr.net/gh/wldeh/bible-api/bibles/en-kjv/books';

    // Curated verses on eternity, love, and mercy
    // Each entry: { book, ch, vv (array of verse numbers), ref (display label) }
    const verses = [
      { book: 'john',          ch: 3,   vv: [16],             ref: 'John 3:16' },
      { book: '1john',         ch: 4,   vv: [8],              ref: '1 John 4:8' },
      { book: 'romans',        ch: 8,   vv: [38,39],          ref: 'Romans 8:38–39' },
      { book: '1corinthians',  ch: 13,  vv: [4,5,6,7,8],      ref: '1 Corinthians 13:4–8' },
      { book: 'romans',        ch: 5,   vv: [8],              ref: 'Romans 5:8' },
      { book: 'john',          ch: 14,  vv: [2,3],            ref: 'John 14:2–3' },
      { book: 'revelation',    ch: 21,  vv: [4],              ref: 'Revelation 21:4' },
      { book: 'psalms',        ch: 23,  vv: [6],              ref: 'Psalm 23:6' },
      { book: 'psalms',        ch: 103, vv: [17],             ref: 'Psalm 103:17' },
      { book: 'lamentations',  ch: 3,   vv: [22,23],          ref: 'Lamentations 3:22–23' },
      { book: 'micah',         ch: 7,   vv: [18],             ref: 'Micah 7:18' },
      { book: 'psalms',        ch: 136, vv: [1],              ref: 'Psalm 136:1' },
      { book: 'isaiah',        ch: 40,  vv: [28],             ref: 'Isaiah 40:28' },
      { book: 'john',          ch: 11,  vv: [25,26],          ref: 'John 11:25–26' },
      { book: '1peter',        ch: 4,   vv: [8],              ref: '1 Peter 4:8' },
      { book: 'zephaniah',     ch: 3,   vv: [17],             ref: 'Zephaniah 3:17' },
      { book: 'isaiah',        ch: 54,  vv: [10],             ref: 'Isaiah 54:10' },
      { book: 'jeremiah',      ch: 31,  vv: [3],              ref: 'Jeremiah 31:3' },
      { book: 'ephesians',     ch: 3,   vv: [17,18,19],       ref: 'Ephesians 3:17–19' },
      { book: 'psalms',        ch: 86,  vv: [15],             ref: 'Psalm 86:15' },
      { book: 'psalms',        ch: 100, vv: [5],              ref: 'Psalm 100:5' },
      { book: 'john',          ch: 15,  vv: [13],             ref: 'John 15:13' },
      { book: '1corinthians',  ch: 13,  vv: [13],             ref: '1 Corinthians 13:13' },
      { book: 'psalms',        ch: 145, vv: [8],              ref: 'Psalm 145:8' },
      { book: 'numbers',       ch: 6,   vv: [24,25,26],       ref: 'Numbers 6:24–26' },
    ];

    let last = -1;

    function pick() {
      let i;
      do { i = Math.floor(Math.random() * verses.length); } while (i === last);
      last = i;
      return verses[i];
    }

    function cleanText(t) {
      return t
        .replace(/\[\d+:\d+[^\]]*\]/g, '')
        .replace(/[¶]/g, '')
        .trim();
    }

    async function fetchVerse({ book, ch, vv }) {
      const results = await Promise.all(
        vv.map(v =>
          fetch(`${BASE}/${book}/chapters/${ch}/verses/${v}.json`).then(r => r.json())
        )
      );
      return results.map(r => cleanText(r.text)).join(' ');
    }

    const textEl = document.getElementById('verse-text');
    const refEl  = document.getElementById('verse-reference');
    const btn    = document.getElementById('btn');

    async function load() {
      btn.disabled = true;

      if (textEl.textContent.trim()) {
        textEl.classList.add('fading');
        refEl.classList.add('fading');
        await new Promise(r => setTimeout(r, 500));
      }

      const entry = pick();
      try {
        const text = await fetchVerse(entry);
        textEl.textContent = text;
        refEl.textContent  = entry.ref;
      } catch {
        textEl.textContent = 'For God so loved the world that he gave his one and only Son, that everyone who believes in him shall not perish but have eternal life.';
        refEl.textContent  = 'John 3:16';
      }

      textEl.classList.remove('fading');
      refEl.classList.remove('fading');
      btn.disabled = false;
    }

    btn.addEventListener('click', load);
    load();
  </script>

</body>
</html>
